<!DOCTYPE html>
<html lang="en">
<head>
    </head>
<body>
    <nav>
        <div class="logo">📚 LIBFLOW | ARCHIVE VAULT</div>
        <a href="/dashboard" class="btn-logout" style="border-color: var(--accent-sage); color: var(--accent-sage);">Back to Dashboard</a>
    </nav>

    <div class="main-container" style="grid-template-columns: 1fr; margin-top: 50px;">
        <div class="card">
            <h2 style="font-family: 'Playfair Display'; margin-bottom: 25px;">Archived Records</h2>
            <table>
                <thead>
                    <tr><th>Book Details</th><th>Status</th></tr>
                </thead>
                <tbody>
                    {% for book in books %}
                    <tr>
                        <td>
                            <div style="font-weight: 800;">{{ book[1] }}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">{{ book[2] }}</div>
                        </td>
                        <td><span style="background: #eee; padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 800;">ARCHIVED</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
