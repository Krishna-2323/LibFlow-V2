<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibFlow | {{ role | capitalize }} Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-latte: #eaddca;
            --card-white: #ffffff;
            --accent-sage: #5f7a6b;
            --text-coffee: #3e362e;
            --border-beige: #d4c5b3;
            /* Dynamic Role Color */
            --role-color: {% if role == 'admin' %}#5f7a6b{% else %}#ffffff{% endif %};
            --role-text: {% if role == 'admin' %}#ffffff{% else %}#3e362e{% endif %};
        }

        body {
            background-color: var(--bg-latte);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: var(--card-white);
            width: 400px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid var(--border-beige);
            text-align: center;
        }

        .role-badge {
            display: inline-block;
            padding: 6px 15px;
            background: {% if role == 'admin' %}#5f7a6b{% else %}#eaddca{% endif %};
            color: {% if role == 'admin' %}#ffffff{% else %}#3e362e{% endif %};
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: var(--accent-sage); }
        
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-beige);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-sage); box-shadow: 0 0 0 4px rgba(95, 122, 107, 0.1); }

        .btn-login {
            width: 100%;
            background: var(--accent-sage);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(95, 122, 107, 0.3); }

        .back-link { display: block; margin-top: 25px; font-size: 0.85rem; color: var(--text-coffee); text-decoration: none; opacity: 0.6; }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="role-badge">{{ role }} Portal</div>
    <h2>Login to LibFlow</h2>

    <form action="/login/{{ role }}" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your ID" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Authorize Access</button>
    </form>

    <a href="/" class="back-link">← Change Portal</a>
</div>

</body>
</html>
